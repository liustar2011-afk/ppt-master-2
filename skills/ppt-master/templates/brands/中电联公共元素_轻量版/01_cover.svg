<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="720" viewBox="0 0 1280 720" data-brand-template="01_cover">
  <!-- 背景：中电联品牌封面底图 -->
  <image x="0" y="0" width="1280" height="720" xlink:href="cover_bg.jpg" preserveAspectRatio="xMidYMid slice"/>

  <!-- 几何装饰 -->
  <g id="cover-decor">
    <circle cx="80" cy="640" r="180" fill="none" stroke="#4AB3D6" stroke-width="1" stroke-opacity="0.12"/>
    <circle cx="80" cy="640" r="120" fill="none" stroke="#4AB3D6" stroke-width="1" stroke-opacity="0.08"/>
    <circle cx="1180" cy="120" r="4" fill="#8B0000" fill-opacity="0.25"/>
    <circle cx="1210" cy="100" r="3" fill="#8B0000" fill-opacity="0.18"/>
    <circle cx="1195" cy="145" r="2" fill="#8B0000" fill-opacity="0.12"/>
  </g>

  <!-- 上半浅色区域：标题 -->
  <text x="640" y="250" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="54" font-weight="700" fill="#1F2933">{{TITLE}}</text>

  <!-- 下半深蓝区域：作者、机构名称、日期 -->
  <text x="640" y="500" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#EAF3FF" fill-opacity="0.85">{{AUTHOR}}</text>
  <text x="640" y="560" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF">中国电力企业联合会</text>
  <text x="640" y="630" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#EAF3FF">{{DATE}}</text>
</svg>
